<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bert Bullough</title>
    <meta name="description" content="Bert Bullough - Writing">
    <meta name="author" content="Bert Bullough">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>B</text></svg>">

    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo">Bert Bullough</a>
            <nav>
                <a href="/">Writing</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="post-list">
            <div class="container">
                <div class="section-header">
                    <h2>Writing</h2>
                    <span>Blog</span>
                </div>

                {{posts}}
            </div>
        </section>
    </main>

    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Get in touch</h3>
                    <p>Open to interesting projects and collaborations.</p>
                </div>

                <!-- No Twitter/X link. I don't support Nazis. -->
                <div class="footer-links">
                    <a href="https://github.com/dirtmerchant" target="_blank" rel="noopener">GitHub</a>
                    <a href="https://linkedin.com/in/bertbullough" target="_blank" rel="noopener">LinkedIn</a>
                    <a href="mailto:hello@bertbullough.com">Email</a>
                </div>
            </div>

            <p class="copyright">&copy; 2026 Bert Bullough. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
